<!DOCTYPE html>
<html>
<head>
    <title>Futuristic Test</title>
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/futuristic.css' %}">
    <style>
        body {
            background: #0a0a0a;
            color: #00ff88;
            font-family: 'Orbitron', sans-serif;
            padding: 50px;
        }
        .test-box {
            border: 2px solid #00ff88;
            padding: 20px;
            box-shadow: 0 0 20px #00ff88;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1 class="glitch" data-text="FUTURISTIC TEST">FUTURISTIC TEST</h1>
    
    <div class="test-box holographic">
        <h2>✅ Futuristic Styles Loaded!</h2>
        <p>If you see:</p>
        <ul>
            <li>Green neon glow</li>
            <li>Orbitron font</li>
            <li>Holographic effect on this box</li>
            <li>Dark background</li>
        </ul>
        <p>Then futuristic styles are working!</p>
    </div>
    
    <button class="btn-futuristic">TEST BUTTON</button>
    
    <div class="cyber-grid"></div>
    <div class="matrix-rain"></div>
</body>
</html>
